name: Rafraîchir le cockpit CX

# Quand le robot tourne :
on:
  schedule:
    - cron: "0 6 * * 1"      # chaque lundi à 06:00 UTC (08:00 heure de Paris)
  workflow_dispatch: {}       # + un bouton « Run workflow » pour lancer à la main
  push:
    branches: [ main ]        # + à chaque mise à jour du code

permissions:
  contents: read
  pages: write
  id-token: write

# Évite deux publications en même temps
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install requests

      - name: Générer le cockpit (données Intercom live)
        env:
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
        run: python cockpit_auto.py --weeks 10 --out index.html

      - name: Préparer le dossier à publier
        run: |
          mkdir -p site
          cp index.html site/index.html

      - name: Empaqueter pour GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
