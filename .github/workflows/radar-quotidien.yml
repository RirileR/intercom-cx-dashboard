# À placer dans : .github/workflows/radar-quotidien.yml
name: Radar incidents CX (quotidien)

on:
  schedule:
    # 8h Paris (CEST = UTC+2) chaque jour  →  6h UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write          # pour committer la baseline (radar_history.csv)

concurrency:
  group: radar-quotidien
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run radar
        env:
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # CLAUDE_MODEL: claude-sonnet-4-6
        run: python radar_quotidien.py

      - name: Persister la baseline
        if: always()
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name  "radar-bot"
            git config user.email "actions@github.com"
            git add state/radar_history.csv
            git commit -m "radar quotidien: maj baseline [skip ci]"
            git push
          else
            echo "Pas de changement de baseline."
          fi
